<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Surprise</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      color: white;
      background: url("otter_birthday.jpg") center/cover no-repeat;
      background-size: cover;      /* fills entire screen */
      background-repeat: no-repeat;
      background-position: center;
      height: 100vh;
      margin: 0;
    }

    h1 {
      font-size: 8vw; /* responsive text */
    }

    p {
      font-size: 4vw;
    }

    .box {
      width: 90%;
      max-width: 500px;
      margin: auto;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 15px;
    }

    @media (min-width: 768px) {
      h1 {
        font-size: 50px;
      }
      p {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>🎉 Happy Birthday 🎂</h1>
    <p>You mean a lot to me 💖</p>
    <img src="otter_birthday.jpg">
  </div>
</body>
</html>
