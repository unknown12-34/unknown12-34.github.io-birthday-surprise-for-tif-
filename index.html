<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Surprise</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;

      background-color: pink; /* fallback base */
  
      background: linear-gradient(
           rgba(255, 192, 203, 0.3),  /* pink overlay */
          rgba(255, 192, 203, 0.3)
           ),
           url("aceflux-flag-light pink-color.png") no-repeat center center/cover;

    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    }
    .gallery {
      display: flex;
      gap: 20px;              /* space between images */
      flex-wrap: wrap;        /* allows stacking on phone */
      justify-content: center;
    }

    .gallery img {
      width: 150px;           /* control size here */
      height: auto;
      border-radius: 15px;
      object-fit: cover;
    }
    .content {
      padding: 20px;
    }

    h1 {
      font-size: 8vw;
      margin: 0;
    }

    p {
      font-size: 4vw;
    }

    @media (min-width: 768px) {
      h1 {
        font-size: 50px;
      }
      p {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="content">
    <h1>🎉 Happy Birthday 🎂</h1>
    <p>Hope you like this gift for your birthday even though its not a happy month but today is a happy day!! 💖</p>
  </div>  
  <div class="gallery">
    <img src="2.jpeg">
    <img src="otter_birthday2.jpg">
    <img src="1.jpeg">
  </div>
</body>

<end>

</end>
  </html>
