<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Tif</title>

  <style>
    /* ===== GLOBAL STYLING ===== */
    
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: grey;
      text-align: center;
      padding: 20px;
      overflow-x: hidden;

      /* Background with overlay */
      background: linear-gradient(rgba(255,192,203,0.3), rgba(255,192,203,0.3)),
                  url("aceflux-flag-light pink-color.png") no-repeat center/cover;
    }

    /* Main heading */
    h1 {
      font-size: 6vw;
      margin-top: 20px;
    }

    /* Paragraph default size */
    p {
      font-size: 20px;
    }

    /* Button styling */
    .btn {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: white;
      margin-top: 30px;
    }

    /* ===== GALLERY (hidden first) ===== */
    .gallery {
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 30px;

      /* animation setup */
      opacity: 0;
      transform: translateY(20px);
      transition: 1s ease;
    }

    /* When activated */
    .gallery.show {
      display: flex;
      opacity: 1;
      transform: translateY(0);
    }

    .gallery img {
      width: 150px;
      border-radius: 12px;
    }

    /* ===== FADE TEXT EFFECT ===== */
    .fade {
      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
</html>
